name: Provision and deploy MCT Timer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environmentName:
        description: "Short environment name used in Azure resource names"
        required: true
        default: "dev"
      location:
        description: "Azure region"
        required: true
        default: "eastus2"
      appServiceSkuName:
        description: "App Service Plan SKU, for example F1, D1, S1"
        required: true
        default: "F1"

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: "./mct-timer/mct-timer.csproj"
  TEST_PROJECT_PATH: "./mct-timer.Tests/mct-timer.Tests.csproj"
  PUBLISH_DIR: "${{ github.workspace }}/publish"
  AZURE_ENV_NAME: ${{ inputs.environmentName || vars.AZURE_ENV_NAME || 'dev' }}
  AZURE_LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'eastus2' }}
  APP_SERVICE_SKU_NAME: ${{ inputs.appServiceSkuName || vars.APP_SERVICE_SKU_NAME || 'F1' }}

jobs:
  build-test-provision-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environmentName || vars.AZURE_ENV_NAME || 'dev' }}
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ./mct-timer.sln

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-restore --runtime win-x86 --self-contained true --output "${{ env.PUBLISH_DIR }}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "rg-mct-timer-${AZURE_ENV_NAME}" \
            --location "${AZURE_LOCATION}"

      - name: Provision Azure infrastructure
        id: provision
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_MODEL: ${{ vars.AZURE_OPENAI_MODEL || 'dall-e-3' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PWD_RESET_REQUEST_URL: ${{ secrets.PWD_RESET_REQUEST_URL }}
        run: |
          deployment_name="mct-timer-${AZURE_ENV_NAME}-${GITHUB_RUN_ID}"

          az deployment group create \
            --name "$deployment_name" \
            --resource-group "rg-mct-timer-${AZURE_ENV_NAME}" \
            --template-file ./infra/main.bicep \
            --parameters environmentName="${AZURE_ENV_NAME}" \
                         location="${AZURE_LOCATION}" \
                         appServiceSkuName="${APP_SERVICE_SKU_NAME}" \
                         openAiEndpoint="${AZURE_OPENAI_ENDPOINT}" \
                         openAiKey="${AZURE_OPENAI_KEY}" \
                         openAiModel="${AZURE_OPENAI_MODEL}" \
                         jwtSecret="${JWT_SECRET}" \
                         pwdResetRequestUrl="${PWD_RESET_REQUEST_URL}"

          web_app_name=$(az deployment group show \
            --name "$deployment_name" \
            --resource-group "rg-mct-timer-${AZURE_ENV_NAME}" \
            --query "properties.outputs.webAppName.value" \
            --output tsv)

          echo "WEB_APP_NAME=$web_app_name" >> "$GITHUB_ENV"

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
