name: Provision and deploy MCT Timer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environmentName:
        description: "Short environment name used in Azure resource names"
        required: true
        default: "dev"
      location:
        description: "Azure region"
        required: true
        default: "eastus2"

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: "10.0.x"
  TEST_PROJECT_PATH: "./mct-timer.Tests/mct-timer.Tests.csproj"
  AZURE_ENV_NAME: ${{ inputs.environmentName || vars.AZURE_ENV_NAME || 'dev' }}
  AZURE_LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'eastus2' }}
  IMAGE_REPOSITORY: "mct-timer"

jobs:
  build-test-provision-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environmentName || vars.AZURE_ENV_NAME || 'dev' }}
      url: ${{ steps.deploy.outputs.container-app-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ./mct-timer.sln

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-restore

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "rg-mct-timer-${AZURE_ENV_NAME}" \
            --location "${AZURE_LOCATION}"

      - name: Provision Azure infrastructure
        id: provision
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_MODEL: ${{ vars.AZURE_OPENAI_MODEL || 'dall-e-3' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PWD_RESET_REQUEST_URL: ${{ secrets.PWD_RESET_REQUEST_URL }}
        run: |
          deployment_name="mct-timer-${AZURE_ENV_NAME}-${GITHUB_RUN_ID}-bootstrap"

          az deployment group create \
            --name "$deployment_name" \
            --resource-group "rg-mct-timer-${AZURE_ENV_NAME}" \
            --template-file ./infra/main.bicep \
            --parameters environmentName="${AZURE_ENV_NAME}" \
                         location="${AZURE_LOCATION}" \
                         openAiEndpoint="${AZURE_OPENAI_ENDPOINT}" \
                         openAiKey="${AZURE_OPENAI_KEY}" \
                         openAiModel="${AZURE_OPENAI_MODEL}" \
                         jwtSecret="${JWT_SECRET}" \
                         pwdResetRequestUrl="${PWD_RESET_REQUEST_URL}"

          acr_name=$(az deployment group show \
            --name "$deployment_name" \
            --resource-group "rg-mct-timer-${AZURE_ENV_NAME}" \
            --query "properties.outputs.acrName.value" \
            --output tsv)

          acr_login_server=$(az deployment group show \
            --name "$deployment_name" \
            --resource-group "rg-mct-timer-${AZURE_ENV_NAME}" \
            --query "properties.outputs.acrLoginServer.value" \
            --output tsv)

          echo "ACR_NAME=$acr_name" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$acr_login_server" >> "$GITHUB_ENV"

      - name: Build and push container image
        run: |
          az acr build \
            --registry "${ACR_NAME}" \
            --image "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --file ./mct-timer/Dockerfile \
            .

      - name: Deploy Container App image
        id: deploy
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_MODEL: ${{ vars.AZURE_OPENAI_MODEL || 'dall-e-3' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PWD_RESET_REQUEST_URL: ${{ secrets.PWD_RESET_REQUEST_URL }}
        run: |
          deployment_name="mct-timer-${AZURE_ENV_NAME}-${GITHUB_RUN_ID}-app"
          image="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${GITHUB_SHA}"

          az deployment group create \
            --name "$deployment_name" \
            --resource-group "rg-mct-timer-${AZURE_ENV_NAME}" \
            --template-file ./infra/main.bicep \
            --parameters environmentName="${AZURE_ENV_NAME}" \
                         location="${AZURE_LOCATION}" \
                         containerImage="$image" \
                         openAiEndpoint="${AZURE_OPENAI_ENDPOINT}" \
                         openAiKey="${AZURE_OPENAI_KEY}" \
                         openAiModel="${AZURE_OPENAI_MODEL}" \
                         jwtSecret="${JWT_SECRET}" \
                         pwdResetRequestUrl="${PWD_RESET_REQUEST_URL}"

          container_app_url=$(az deployment group show \
            --name "$deployment_name" \
            --resource-group "rg-mct-timer-${AZURE_ENV_NAME}" \
            --query "properties.outputs.containerAppUrl.value" \
            --output tsv)

          echo "container-app-url=$container_app_url" >> "$GITHUB_OUTPUT"
